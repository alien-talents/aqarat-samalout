<!DOCTYPE html>
<html>
<head>
  <title>Icon Generator - Aqarat Samalout</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    canvas { border: 1px solid #ccc; margin: 10px; }
    .icon-container { display: inline-block; text-align: center; margin: 10px; }
  </style>
</head>
<body>
  <h1>PWA Icon Generator</h1>
  <p>Right-click each icon and "Save Image As" to download</p>
  <div id="icons"></div>

  <script>
    const sizes = [16, 32, 72, 96, 128, 144, 152, 180, 192, 384, 512];
    const container = document.getElementById('icons');

    sizes.forEach(size => {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Background - dark blue
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, size, size);

      // Gold gradient circle
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#fbbf24');
      gradient.addColorStop(1, '#f59e0b');
      
      ctx.beginPath();
      ctx.arc(size/2, size/2, size*0.4, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();

      // Letter S
      ctx.fillStyle = '#0f172a';
      ctx.font = `bold ${size*0.5}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('S', size/2, size/2);

      const wrapper = document.createElement('div');
      wrapper.className = 'icon-container';
      wrapper.innerHTML = `
        <div>icon-${size}x${size}.png</div>
      `;
      wrapper.appendChild(canvas);
      container.appendChild(wrapper);

      // Add download link
      const link = document.createElement('a');
      link.download = `icon-${size}x${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.textContent = 'Download';
      wrapper.appendChild(document.createElement('br'));
      wrapper.appendChild(link);
    });
  </script>
</body>
</html>
